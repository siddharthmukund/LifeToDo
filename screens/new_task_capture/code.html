<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "inverse-on-surface": "#555461",
            "surface-tint": "#37f6dd",
            "error": "#ff716c",
            "background": "#0d0d18",
            "primary-fixed-dim": "#11e8cf",
            "on-surface": "#e9e6f7",
            "on-primary-fixed": "#00443c",
            "outline": "#757482",
            "on-surface-variant": "#aba9b9",
            "secondary": "#c57eff",
            "on-tertiary-fixed": "#001a27",
            "primary-container": "#00e5cc",
            "tertiary": "#59caff",
            "surface-container-highest": "#242434",
            "inverse-primary": "#006b5f",
            "surface-variant": "#242434",
            "on-error": "#490006",
            "surface-container": "#181826",
            "tertiary-fixed": "#0cbefb",
            "surface-container-lowest": "#000000",
            "on-tertiary": "#003f57",
            "secondary-fixed": "#e7c5ff",
            "on-tertiary-fixed-variant": "#003e55",
            "secondary-dim": "#c57eff",
            "error-container": "#9f0519",
            "on-secondary-container": "#e6c3ff",
            "tertiary-container": "#0cbefb",
            "primary": "#37f6dd",
            "surface-dim": "#0d0d18",
            "on-background": "#e9e6f7",
            "tertiary-dim": "#00afe8",
            "on-secondary": "#340058",
            "surface-container-low": "#12121e",
            "surface-container-high": "#1e1e2d",
            "secondary-container": "#6a0baa",
            "on-primary-fixed-variant": "#006358",
            "primary-fixed": "#37f6dd",
            "on-secondary-fixed": "#510085",
            "on-tertiary-container": "#003549",
            "surface": "#0d0d18",
            "on-primary-container": "#004d44",
            "inverse-surface": "#fcf8ff",
            "surface-bright": "#2b2a3c",
            "on-secondary-fixed-variant": "#7520b5",
            "tertiary-fixed-dim": "#00afe8",
            "primary-dim": "#11e8cf",
            "error-dim": "#d7383b",
            "on-primary": "#00594e",
            "outline-variant": "#474754",
            "secondary-fixed-dim": "#deb3ff",
            "on-error-container": "#ffa8a3"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Manrope"],
            "label": ["Manrope"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .neon-glow-primary {
      box-shadow: 0 0 20px rgba(0, 229, 204, 0.4);
    }
    .orb-pulse-1 {
      border: 1px solid rgba(0, 229, 204, 0.2);
      transform: scale(1.2);
    }
    .orb-pulse-2 {
      border: 1px solid rgba(0, 229, 204, 0.1);
      transform: scale(1.5);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen overflow-hidden flex flex-col">
<!-- TopAppBar: Predicted Component -->
<header class="fixed top-0 w-full z-50 bg-[#0d0d18]/60 backdrop-blur-2xl shadow-[0_0_20px_rgba(0,229,204,0.1)] flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="hover:bg-[#242434] transition-all duration-300 active:scale-95 duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[#00e5cc]" data-icon="close">close</span>
</button>
<h1 class="font-manrope font-bold tracking-tight text-xl text-on-surface">Life To Do</h1>
</div>
<div class="flex items-center gap-2">
<span class="text-[#00e5cc] font-bold text-sm tracking-widest font-label">READY</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-8 relative">
<!-- Background Decor -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Voice Capture Section -->
<div class="relative flex flex-col items-center z-10">
<!-- Pulsing Rings (Visual only) -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-36 h-36 rounded-full border border-primary/20 scale-[1.3] opacity-60"></div>
<div class="w-36 h-36 rounded-full border border-primary/10 scale-[1.8] opacity-30"></div>
</div>
<!-- Massive Voice Orb -->
<button class="relative w-[144px] h-[144px] rounded-full bg-[#00e5cc]/20 backdrop-blur-md flex items-center justify-center group active:scale-90 duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] shadow-[0_0_40px_rgba(0,229,204,0.4)] border border-primary/30">
<!-- Inner Core -->
<div class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-[0_0_20px_rgba(0,229,204,0.6)]">
<span class="material-symbols-outlined text-on-primary-container text-5xl" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</button>
<!-- Pulse Transcript -->
<div class="mt-16 text-center max-w-xs space-y-4">
<p class="text-primary italic font-medium text-lg leading-relaxed opacity-90 animate-pulse">
          Listening... "Research new flight options for..."
        </p>
<p class="text-on-surface-variant text-sm font-label tracking-wide uppercase opacity-60">
          Speak clearly to capture
        </p>
</div>
<!-- Fallback Action -->
<button class="mt-12 flex items-center gap-2 px-6 py-3 rounded-full bg-surface-container-highest/40 border border-outline-variant/10 hover:bg-surface-container-highest transition-all active:scale-95 text-on-surface-variant font-label text-xs uppercase tracking-widest">
<span>⌨️ Or Type</span>
</button>
</div>
<!-- Contextual Suggestion Bento Snippet -->
<div class="mt-24 w-full grid grid-cols-2 gap-3 max-w-sm">
<div class="bg-surface-container-low p-4 rounded-xl border border-outline-variant/5">
<span class="material-symbols-outlined text-secondary text-xl block mb-2" data-icon="auto_awesome">auto_awesome</span>
<p class="text-[10px] text-on-surface-variant uppercase font-bold tracking-tighter">Smart Tag</p>
<p class="text-on-surface text-xs font-bold mt-1">Travel Planning</p>
</div>
<div class="bg-surface-container-low p-4 rounded-xl border border-outline-variant/5">
<span class="material-symbols-outlined text-tertiary text-xl block mb-2" data-icon="schedule">schedule</span>
<p class="text-[10px] text-on-surface-variant uppercase font-bold tracking-tighter">Detected Time</p>
<p class="text-on-surface text-xs font-bold mt-1">Next Friday</p>
</div>
</div>
</main>
<!-- Navigation Shell (BottomNavBar suppressed/minimal as requested for focused task) -->
<footer class="fixed bottom-0 w-full z-50 pb-safe bg-transparent flex justify-around items-center h-20 px-8">
<!-- Bottom Nav is suppressed for focus. Only showing the safe area spacer with subtle tone -->
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent pointer-events-none"></div>
<!-- Minimal Indicator -->
<div class="w-12 h-1 bg-surface-container-highest rounded-full opacity-30 mb-2"></div>
</footer>
<!-- Visual Overlay for Glass Effect Depth -->
<div class="fixed inset-0 pointer-events-none z-[-1] bg-[radial-gradient(circle_at_50%_50%,_rgba(18,18,30,1)_0%,_rgba(13,13,24,1)_100%)]"></div>
</body></html>
