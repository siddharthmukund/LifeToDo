<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Inbox Zero Celebration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9a25f4",
                        "background-light": "#f7f5f8",
                        "background-dark": "#0a050d",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .vibrant-glow {
            box-shadow: 0 0 60px 10px rgba(154, 37, 244, 0.4);
        }
        .radial-gradient-bg {
            background: radial-gradient(circle at center, rgba(154, 37, 244, 0.15) 0%, rgba(10, 5, 13, 1) 70%);
        }
        .floating-particle {
            position: absolute;
            background: #9a25f4;
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(1px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden radial-gradient-bg">
<!-- Header -->
<header class="flex items-center justify-between p-6 pt-12">
<div class="text-primary flex size-10 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-3xl">task_alt</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-widest flex-1 text-center">Life To Do</h2>
<div class="size-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Content Section -->
<main class="flex-1 flex flex-col items-center justify-center px-6 relative">
<!-- Decorative Floating Particles Simulation -->
<div class="absolute inset-0 pointer-events-none">
<div class="floating-particle h-1 w-1 top-1/4 left-1/4"></div>
<div class="floating-particle h-2 w-2 top-1/3 right-1/4"></div>
<div class="floating-particle h-1.5 w-1.5 bottom-1/4 left-1/3"></div>
<div class="floating-particle h-1 w-1 top-1/2 right-1/3"></div>
</div>
<!-- Central Hero Visual -->
<div class="relative mb-12 flex items-center justify-center">
<!-- Aura Glow -->
<div class="absolute h-48 w-48 bg-primary/30 rounded-full blur-[80px]"></div>
<!-- 3D Checkmark Representative Container -->
<div class="relative z-10 flex items-center justify-center h-44 w-44 rounded-full bg-gradient-to-br from-primary to-primary/60 vibrant-glow border border-primary/40">
<span class="material-symbols-outlined text-[100px] text-white leading-none">check_circle</span>
</div>
</div>
<!-- Typography -->
<div class="text-center space-y-4">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-5xl font-extrabold leading-tight">
                    Inbox Zero
                </h1>
<p class="text-slate-600 dark:text-slate-400 text-lg font-light leading-normal max-w-xs mx-auto">
                    Your mind is clear. You've processed everything for today.
                </p>
</div>
<!-- Detailed Catchup Info -->
<div class="mt-12 p-6 rounded-2xl bg-primary/5 border border-primary/10 backdrop-blur-sm max-w-sm w-full">
<div class="flex items-center gap-4">
<div class="size-12 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">celebration</span>
</div>
<div>
<p class="text-slate-900 dark:text-slate-100 font-bold">All caught up!</p>
<p class="text-slate-500 dark:text-slate-500 text-sm">Take a moment to enjoy the clarity.</p>
</div>
</div>
</div>
</main>
<!-- Action Area -->
<footer class="p-8 pb-12 flex flex-col gap-4 w-full max-w-md mx-auto">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-6 bg-primary text-white text-base font-bold transition-all active:scale-95 shadow-lg shadow-primary/25">
<span class="truncate">Start Review</span>
</button>
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-6 bg-slate-200 dark:bg-primary/10 text-slate-900 dark:text-primary text-base font-bold transition-all active:scale-95">
<span class="truncate">Return to Dashboard</span>
</button>
<!-- Bottom Indicator (iOS Style) -->
<div class="w-32 h-1 bg-slate-300 dark:bg-slate-800 rounded-full mx-auto mt-6"></div>
</footer>
<!-- Hidden Image for Reference requirement -->
<div class="hidden">
<img data-alt="Abstract vibrant violet cosmic nebula background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9pYUTYo9O6LoFX0zWrLY95yqAzzTV7ujhb39fT6k0B9lQLURpdgQeYfYqGqNu4SZ3qGRgjnwWqz9DdQZmzcH5KsWtrrj5-3LW2H3OB-T3oZKlWeQ0idiRmZ2mZSSGwivBygZf2kApiZTC4k9oFRIjJVZA_Y2vpKMhwX9uq1devPq1B64FyHxuRmliGyPX5bPpeB5Bz5QA7vGkFKDq3sNn7afJE6iHzz6X8xyUwQQVy8oF0c3iggLoMM2TZVgVY8FMreYs1sSD0LE"/>
</div>
</div>
</body></html>
