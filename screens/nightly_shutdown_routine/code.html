<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#902bee",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                        "amber-accent": "#ffbf00",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glow-icon {
            text-shadow: 0 0 8px rgba(255, 191, 0, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex h-screen w-full max-w-[430px] mx-auto flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-primary flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-3xl text-amber-accent glow-icon">bedtime</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Nightly Shutdown</h2>
<div class="size-12"></div> <!-- Spacer for balance -->
</div>
<div class="flex-1 overflow-y-auto px-4 pb-20">
<!-- Header Message -->
<div class="py-8 text-center">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight">Day Complete</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-base">Rest well, you've done enough.</p>
</div>
<!-- Today's Wins Card -->
<div class="flex flex-wrap gap-4 mb-8">
<div class="flex min-w-[158px] flex-1 flex-col gap-2 rounded-xl p-6 bg-primary/10 border border-primary/20">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-amber-accent text-xl">star</span>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium uppercase tracking-wider">Today's Wins</p>
</div>
<p class="text-primary tracking-tight text-2xl font-bold leading-tight mt-1">3/3 Top Actions Done</p>
</div>
</div>
<!-- Checklist Section -->
<div class="space-y-4">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-semibold px-1 mb-2">Clear Your Mind</h3>
<div class="space-y-3">
<!-- Checklist Item 1 -->
<label class="flex items-center gap-4 p-4 rounded-xl bg-slate-100 dark:bg-primary/5 border border-transparent dark:border-white/5 active:scale-[0.98] transition-transform">
<div class="relative flex items-center justify-center">
<input class="h-6 w-6 rounded-full border-primary/30 border-2 bg-transparent text-primary checked:bg-primary checked:border-primary focus:ring-0 focus:ring-offset-0 focus:outline-none" type="checkbox"/>
</div>
<div class="flex flex-col flex-1">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-tight">Record lingering 'open loops'</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Empty your mental inbox</p>
</div>
<span class="material-symbols-outlined text-amber-accent/60 text-xl glow-icon">nights_stay</span>
</label>
<!-- Checklist Item 2 -->
<label class="flex items-center gap-4 p-4 rounded-xl bg-slate-100 dark:bg-primary/5 border border-transparent dark:border-white/5 active:scale-[0.98] transition-transform">
<div class="relative flex items-center justify-center">
<input class="h-6 w-6 rounded-full border-primary/30 border-2 bg-transparent text-primary checked:bg-primary checked:border-primary focus:ring-0 focus:ring-offset-0 focus:outline-none" type="checkbox"/>
</div>
<div class="flex flex-col flex-1">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-tight">Review tomorrow's calendar</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Know what's coming next</p>
</div>
<span class="material-symbols-outlined text-amber-accent/60 text-xl glow-icon">nights_stay</span>
</label>
<!-- Checklist Item 3 -->
<label class="flex items-center gap-4 p-4 rounded-xl bg-slate-100 dark:bg-primary/5 border border-transparent dark:border-white/5 active:scale-[0.98] transition-transform">
<div class="relative flex items-center justify-center">
<input class="h-6 w-6 rounded-full border-primary/30 border-2 bg-transparent text-primary checked:bg-primary checked:border-primary focus:ring-0 focus:ring-offset-0 focus:outline-none" type="checkbox"/>
</div>
<div class="flex flex-col flex-1">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-tight">Set a high-level intention</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Choose your primary focus</p>
</div>
<span class="material-symbols-outlined text-amber-accent/60 text-xl glow-icon">nights_stay</span>
</label>
</div>
</div>
</div>
<!-- Sticky Bottom Button -->
<div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light dark:via-background-dark to-transparent">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 shadow-lg shadow-primary/20 transition-all active:scale-95">
<span class="material-symbols-outlined">power_settings_new</span>
<span>End Day &amp; Sleep</span>
</button>
<div class="mt-4 flex justify-center">
<div class="w-32 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</div>
</div>
</body></html>
