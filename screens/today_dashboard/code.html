<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Life To Do - Today Dashboard</title>

              "surface-container-highest": "#242434",
              "primary-fixed": "#37f6dd",
              "secondary-dim": "#c57eff",
              "tertiary": "#59caff",

              "on-background": "#e9e6f7",

<style>
      .glass-card {
        background: rgba(24, 24, 38, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .neon-glow-primary {
        box-shadow: 0 0 20px rgba(0, 229, 204, 0.4);
      }
      .neon-glow-secondary {
        box-shadow: 0 0 20px rgba(157, 78, 221, 0.4);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .pulse-ring {
        animation: pulse 2s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      }
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.5; }
        100% { transform: scale(1.5); opacity: 0; }
      }
      body {
        background-color: #0d0d18;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body text-on-surface antialiased select-none">
<!-- Top App Bar -->
<header class="sticky top-0 w-full z-50 bg-[#0d0d18]/95 backdrop-blur-xl flex items-center justify-between px-6 py-4 max-w-[430px] mx-auto">
<div class="flex items-center gap-3">
<div class="h-10 w-10 rounded-full overflow-hidden border border-primary/20 bg-surface-container">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Portrait of a professional man with short hair and minimalist aesthetic in soft cinematic lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJbdlqMjuBPSfvPvfQsnqUaqYR2ePZK3gIX199GoAJ47az7HCnbWnSPmfa3Py6LBVBNj5lo0nozQt07B3O9o5cE2hYEIkLRx0pB75EhCsk3fYQQpG6NaO_ZubrbRJQFH1j9ahiGsVLLHsxomYCy7s8ZRiNtEb2bzWZCIanEmQyh10BM0ER6_OWEOfIA4J7__Nq6dGPklsY716FOGDbF53i9-w6fgjYVp7AcyTlTpSIjRoKJOgdO6Fy6wvO4xuXK0ry2VAOsAY3xQ"/>
</div>
<h1 class="font-manrope text-[#e9e6f7] font-extrabold text-xl tracking-tight">Life To Do</h1>
</div>
<button class="text-[#e9e6f7] hover:bg-[#242434] transition-colors p-2 rounded-full active:scale-95">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<main class="max-w-[430px] mx-auto px-6 pt-4 pb-40 min-h-screen">
<!-- Action Cards Section -->
<section class="space-y-4">
<div class="flex items-center justify-between mb-2">
<h2 class="text-on-surface-variant font-label text-xs uppercase tracking-[0.2em] font-bold">Today's Focus</h2>
<span class="text-primary font-label text-xs font-bold">4 Tasks</span>
</div>
<!-- Card 1: High Energy -->
<div class="glass-card rounded-xl p-5 flex items-center gap-4 border-l-4 border-l-primary transition-all active:scale-[0.98]">
<div class="flex-grow">
<h3 class="text-body-lg font-bold text-on-surface mb-1">Finalize Launch Plan</h3>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-on-surface-variant" data-icon="business_center">business_center</span>
<span class="text-label-md text-on-surface-variant">🏢 Office</span>
</div>
</div>
<button class="h-11 w-11 rounded-xl border-2 border-primary/10 bg-primary/5 text-primary flex items-center justify-center hover:bg-primary/20 transition-all">
<span class="material-symbols-outlined" data-icon="check">check</span>
</button>
</div>
<!-- Card 2: Medium Energy -->
<div class="glass-card rounded-xl p-5 flex items-center gap-4 border-l-4 border-l-tertiary transition-all active:scale-[0.98]">
<div class="flex-grow">
<h3 class="text-body-lg font-bold text-on-surface mb-1">Update Stakeholders</h3>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-on-surface-variant" data-icon="home">home</span>
<span class="text-label-md text-on-surface-variant">🏠 Home</span>
</div>
</div>
<button class="h-11 w-11 rounded-xl border-2 border-outline-variant text-on-surface-variant flex items-center justify-center hover:border-tertiary/40 hover:text-tertiary transition-all">
<span class="material-symbols-outlined" data-icon="check">check</span>
</button>
</div>
<!-- Card 3: Low Energy -->
<div class="glass-card rounded-xl p-5 flex items-center gap-4 border-l-4 border-l-outline-variant transition-all active:scale-[0.98]">
<div class="flex-grow">
<h3 class="text-body-lg font-bold text-on-surface mb-1 text-on-surface/80">Review Backlog</h3>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-on-surface-variant" data-icon="business_center">business_center</span>
<span class="text-label-md text-on-surface-variant">🏢 Office</span>
</div>
</div>
<button class="h-11 w-11 rounded-xl border-2 border-outline-variant text-on-surface-variant flex items-center justify-center hover:border-outline hover:text-on-surface transition-all">
<span class="material-symbols-outlined" data-icon="check">check</span>
</button>
</div>
<!-- Card 4: High Energy -->
<div class="glass-card rounded-xl p-5 flex items-center gap-4 border-l-4 border-l-primary transition-all active:scale-[0.98]">
<div class="flex-grow">
<h3 class="text-body-lg font-bold text-on-surface mb-1">Design System Review</h3>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-on-surface-variant" data-icon="laptop_mac">laptop_mac</span>
<span class="text-label-md text-on-surface-variant">💻 Studio</span>
</div>
</div>
<button class="h-11 w-11 rounded-xl border-2 border-primary/10 bg-primary/5 text-primary flex items-center justify-center hover:bg-primary/20 transition-all">
<span class="material-symbols-outlined" data-icon="check">check</span>
</button>
</div>
</section>
<!-- Capture Bar (Hero Voice Input) -->
<section class="mt-16 flex flex-col items-center justify-center space-y-6">
<div class="relative flex items-center justify-center">
<!-- Pulsing Rings -->
<div class="absolute w-40 h-40 rounded-full border-2 border-primary/20 pulse-ring"></div>
<div class="absolute w-52 h-52 rounded-full border border-primary/10 pulse-ring" style="animation-delay: 0.5s;"></div>
<!-- Main Orb -->
<button class="relative h-36 w-36 rounded-full bg-primary/20 backdrop-blur-2xl flex items-center justify-center neon-glow-primary border border-primary/40 group active:scale-90 transition-transform duration-200">
<div class="h-28 w-28 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-inner">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</button>
</div>
<div class="text-center space-y-2">
<p class="text-primary font-medium italic opacity-80 animate-pulse tracking-wide">Listening for your next idea...</p>
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2 mx-auto px-4 py-2 rounded-full bg-surface-container-high/50 text-xs font-bold uppercase tracking-widest">
<span class="material-symbols-outlined text-sm" data-icon="keyboard">keyboard</span>
                    Or Type
                </button>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] z-50 rounded-t-lg bg-[#0d0d18]/95 backdrop-blur-xl border-t border-gray-500/10 shadow-[0_-4px_20px_rgba(0,229,204,0.1)] flex justify-around items-center h-16 px-4">
<!-- Bolt (Active) -->
<a class="text-[#00e5cc] shadow-[0_0_20px_rgba(0,229,204,0.4)] active:scale-90 touch-none h-[44px] w-[44px] flex items-center justify-center transition-all" href="#">
<span class="material-symbols-outlined" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</a>
<!-- Inbox -->
<a class="text-[#474754] hover:text-[#37f6dd] active:scale-90 touch-none h-[44px] w-[44px] flex items-center justify-center transition-all" href="#">
<span class="material-symbols-outlined" data-icon="inbox">inbox</span>
</a>
<!-- Folder -->
<a class="text-[#474754] hover:text-[#37f6dd] active:scale-90 touch-none h-[44px] w-[44px] flex items-center justify-center transition-all" href="#">
<span class="material-symbols-outlined" data-icon="folder">folder</span>
</a>
<!-- Event Note -->
<a class="text-[#474754] hover:text-[#37f6dd] active:scale-90 touch-none h-[44px] w-[44px] flex items-center justify-center transition-all" href="#">
<span class="material-symbols-outlined" data-icon="event_note">event_note</span>
</a>
<!-- Settings -->
<a class="text-[#474754] hover:text-[#37f6dd] active:scale-90 touch-none h-[44px] w-[44px] flex items-center justify-center transition-all" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
</nav>
<!-- Background Decorative Gradient -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[5%] left-[-10%] w-[50%] h-[50%] bg-secondary/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
