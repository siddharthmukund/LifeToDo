<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Focus Mode Timer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#902bee",
                        "background-light": "#f7f6f8",
                        "background-dark": "#0a050e", // Deepening for "true black" feel with primary hue
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .nebula-bg {
            background: radial-gradient(circle at 50% 50%, rgba(144, 43, 238, 0.08) 0%, rgba(10, 5, 14, 1) 70%);
        }
        .timer-ring {
            box-shadow: 0 0 20px rgba(144, 43, 238, 0.3);
        }
        .glass-card {
            background: rgba(144, 43, 238, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(144, 43, 238, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col nebula-bg overflow-hidden max-w-md mx-auto">
<!-- Header -->
<header class="flex items-center justify-between p-6">
<button class="text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-slate-400 text-sm font-medium tracking-widest uppercase">Focus Mode</h2>
<div class="w-6"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Timer Section -->
<main class="flex flex-1 flex-col items-center justify-center px-8">
<div class="relative flex items-center justify-center w-72 h-72">
<!-- Circular Progress Ring -->
<svg class="absolute inset-0 w-full h-full transform -rotate-90">
<circle class="text-primary/10" cx="144" cy="144" fill="transparent" r="130" stroke="currentColor" stroke-width="2"></circle>
<circle class="text-primary timer-ring" cx="144" cy="144" fill="transparent" r="130" stroke="currentColor" stroke-dasharray="816" stroke-dashoffset="200" stroke-width="4"></circle>
</svg>
<!-- Countdown Timer -->
<div class="flex flex-col items-center">
<span class="text-7xl font-extralight tracking-tighter text-slate-100">24:59</span>
<span class="text-xs text-primary font-medium tracking-[0.2em] mt-2">MINUTES REMAINING</span>
</div>
</div>
<!-- Current Task Card -->
<div class="mt-16 w-full">
<div class="glass-card rounded-xl p-5 flex items-center gap-4">
<div class="flex-1">
<p class="text-[10px] text-primary font-bold uppercase tracking-widest mb-1">Current Task</p>
<h3 class="text-lg font-medium text-slate-100 leading-tight">Finalizing UI Design System</h3>
<p class="text-sm text-slate-400 mt-1">Life To Do • Design Phase</p>
</div>
<div class="h-12 w-12 rounded-lg bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">edit_note</span>
</div>
</div>
</div>
</main>
<!-- Bottom Controls -->
<footer class="p-8 pb-10 flex flex-col items-center gap-8">
<!-- Ambient Sounds -->
<div class="w-full">
<p class="text-center text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-4">Ambient Atmosphere</p>
<div class="flex justify-between items-center px-4">
<button class="flex flex-col items-center gap-2 text-primary group">
<div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center shadow-[0_0_15px_rgba(144,43,238,0.4)] border border-primary/30">
<span class="material-symbols-outlined text-2xl">water_drop</span>
</div>
<span class="text-[10px] font-medium text-primary">Rain</span>
</button>
<button class="flex flex-col items-center gap-2 text-slate-500 hover:text-primary transition-colors group">
<div class="w-12 h-12 rounded-full bg-slate-800/50 flex items-center justify-center border border-transparent group-hover:border-primary/20">
<span class="material-symbols-outlined text-2xl">forest</span>
</div>
<span class="text-[10px] font-medium">Forest</span>
</button>
<button class="flex flex-col items-center gap-2 text-slate-500 hover:text-primary transition-colors group">
<div class="w-12 h-12 rounded-full bg-slate-800/50 flex items-center justify-center border border-transparent group-hover:border-primary/20">
<span class="material-symbols-outlined text-2xl">air</span>
</div>
<span class="text-[10px] font-medium">White Noise</span>
</button>
<button class="flex flex-col items-center gap-2 text-slate-500 hover:text-primary transition-colors group">
<div class="w-12 h-12 rounded-full bg-slate-800/50 flex items-center justify-center border border-transparent group-hover:border-primary/20">
<span class="material-symbols-outlined text-2xl">headphones</span>
</div>
<span class="text-[10px] font-medium">Lo-fi</span>
</button>
</div>
</div>
<!-- End Focus Button -->
<button class="px-6 py-2 rounded-full text-slate-500 hover:text-red-400 text-xs font-semibold tracking-wide border border-slate-800 transition-all">
                End Focus Session
            </button>
</footer>
</div>
</body></html>
