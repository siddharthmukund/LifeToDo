<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-highest/50 text-on-surface hover:bg-surface-container-highest transition-all duration-300 active:scale-95">

</button>
<h1 class="font-headline font-bold tracking-tight text-[1.75rem] text-[#e9e6f7]">Archive</h1>
</div>
<button class="font-label font-bold text-primary transition-colors duration-300 hover:text-[#37f6dd] active:scale-95">Reset</button>
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-6 pb-32 hide-scrollbar">

<section class="mb-10">
<h2 class="font-headline font-bold text-lg mb-4 text-on-surface-variant tracking-wide">Date Range</h2>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full text-sm font-bold border border-outline-variant/20 bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-all">Today</button>
<button class="px-5 py-2.5 rounded-full text-sm font-bold border border-outline-variant/20 bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-all">Last 7 Days</button>

<button class="px-5 py-2.5 rounded-full text-sm font-bold border border-outline-variant/20 bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-all flex items-center gap-2">

</button>
</div>
</section>

<span class="material-symbols-outlined text-lg" data-icon="business">business</span> Office

<button class="px-5 py-2.5 rounded-full text-sm font-bold border border-outline-variant/20 bg-surface-container-low text-on-surface-variant flex items-center gap-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-lg" data-icon="person">person</span> Personal
                        </button>
<button class="px-5 py-2.5 rounded-full text-sm font-bold border border-outline-variant/20 bg-surface-container-low text-on-surface-variant flex items-center gap-2 hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-lg" data-icon="brush">brush</span> Studio
                        </button>
</div>
</section>

<div class="w-2 h-2 rounded-full bg-primary mb-2 shadow-[0_0_8px_#37f6dd]"></div>
<span class="text-sm font-bold text-on-surface">High</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-surface-container-low border border-outline-variant/10 hover:bg-surface-container-high transition-all group">
<div class="w-2 h-2 rounded-full bg-secondary-fixed-dim mb-2 shadow-[0_0_8px_#deb3ff]"></div>
<span class="text-sm font-bold text-on-surface">Medium</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-2xl bg-surface-container-low border border-outline-variant/10 hover:bg-surface-container-high transition-all group">
<div class="w-2 h-2 rounded-full bg-outline mb-2"></div>
<span class="text-sm font-bold text-on-surface">Low</span>
</button>
</div>
</section>

</label>
