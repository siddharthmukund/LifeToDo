<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-surface-variant": "#aba9b9",
            "surface-container-lowest": "#000000",
            "on-tertiary-container": "#003549",
            "inverse-primary": "#006b5f",
            "on-primary-container": "#004d44",
            "inverse-on-surface": "#555461",
            "error-container": "#9f0519",
            "tertiary-dim": "#00afe8",
            "surface-container-high": "#1e1e2d",
            "surface-variant": "#242434",
            "on-background": "#e9e6f7",
            "tertiary": "#59caff",
            "on-primary": "#00594e",
            "secondary-fixed-dim": "#deb3ff",
            "secondary": "#c57eff",
            "on-secondary": "#340058",
            "on-error-container": "#ffa8a3",
            "primary": "#37f6dd",
            "secondary-dim": "#c57eff",
            "surface-dim": "#0d0d18",
            "secondary-fixed": "#e7c5ff",
            "surface-container": "#181826",
            "surface-tint": "#37f6dd",
            "on-secondary-fixed-variant": "#7520b5",
            "primary-container": "#00e5cc",
            "outline-variant": "#474754",
            "on-secondary-fixed": "#510085",
            "surface": "#0d0d18",
            "on-tertiary": "#003f57",
            "tertiary-fixed-dim": "#00afe8",
            "primary-dim": "#11e8cf",
            "primary-fixed": "#37f6dd",
            "on-primary-fixed-variant": "#006358",
            "surface-container-low": "#12121e",
            "surface-container-highest": "#242434",
            "secondary-container": "#6a0baa",
            "tertiary-container": "#0cbefb",
            "tertiary-fixed": "#0cbefb",
            "on-error": "#490006",
            "primary-fixed-dim": "#11e8cf",
            "error-dim": "#d7383b",
            "inverse-surface": "#fcf8ff",
            "on-tertiary-fixed-variant": "#003e55",
            "on-secondary-container": "#e6c3ff"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Manrope"],
            "label": ["Manrope"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .neon-glow {
      box-shadow: 0 0 40px rgba(0, 229, 204, 0.25);
    }
    .text-glow {
      text-shadow: 0 0 15px rgba(0, 229, 204, 0.4);
    }
    .glass-panel {
      background: rgba(24, 24, 38, 0.4);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- TopAppBar Component -->
<header class="fixed top-0 w-full z-50 bg-[#0d0d18]/60 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full max-w-none">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#00e5cc]" data-icon="target">target</span>
<h1 class="font-manrope font-bold tracking-tight text-lg uppercase text-[#00e5cc] drop-shadow-[0_0_10px_rgba(0,229,204,0.4)]">FOCUS</h1>
</div>
<div class="flex items-center gap-6">
<!-- Low Stim Toggle -->
<div class="flex items-center gap-3 group cursor-pointer">
<span class="font-label text-xs font-bold tracking-widest text-outline-variant uppercase">Low Stim</span>
<div class="w-10 h-5 bg-surface-container rounded-full relative p-1 transition-colors group-hover:bg-surface-container-high">
<div class="absolute left-1 top-1 w-3 h-3 bg-primary rounded-full shadow-[0_0_8px_rgba(0,229,204,0.6)]"></div>
</div>
</div>
<button class="text-[#474754] hover:text-[#37f6dd] transition-all duration-300 scale-95 active:duration-100">
<span class="material-symbols-outlined" data-icon="settings_input_component">settings_input_component</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="min-h-screen flex flex-col items-center justify-center pt-16 pb-24 px-6 overflow-hidden relative">
<!-- Background Depth Elements -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[150px] pointer-events-none"></div>
<!-- Central Focus Ring Section -->
<div class="relative flex flex-col items-center justify-center w-full max-w-2xl text-center">
<!-- The Massive Focus Ring -->
<div class="relative w-72 h-72 md:w-[450px] md:h-[450px] flex items-center justify-center">
<!-- Background Ring Track -->
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="stroke-surface-container fill-none" cx="50%" cy="50%" r="48%" stroke-width="12"></circle>
<!-- Neon Cyan Progress Ring -->
<circle class="stroke-primary fill-none drop-shadow-[0_0_25px_rgba(0,229,204,0.6)]" cx="50%" cy="50%" r="48%" stroke-dasharray="1350" stroke-dashoffset="450" stroke-linecap="round" stroke-width="14"></circle>
</svg>
<!-- Inner Content Cluster -->
<div class="z-10 flex flex-col items-center gap-4 px-12">
<span class="font-label text-xs font-extrabold tracking-[0.3em] text-outline-variant uppercase">Time Remaining</span>
<div class="font-headline font-extrabold text-7xl md:text-8xl tracking-tighter text-on-surface text-glow">
            24:59
          </div>
<div class="h-px w-16 bg-outline-variant/30"></div>
<h2 class="font-headline font-bold text-2xl md:text-4xl text-on-surface leading-tight max-w-xs">
            Draft Marketing Copy
          </h2>
</div>
</div>
<!-- Action Cluster -->
<div class="mt-16 md:mt-24 flex flex-col sm:flex-row items-center gap-6 w-full max-w-md">
<!-- Break Button (Subtle) -->
<button class="w-full h-14 rounded-2xl border border-outline-variant/20 bg-surface-container-low text-on-surface-variant font-bold text-sm tracking-widest uppercase hover:bg-surface-container transition-all cubic-bezier(0.22,1,0.36,1) active:scale-95">
          Take a Break
        </button>
<!-- Done Button (Vibrant Neon) -->
<button class="w-full h-14 rounded-2xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-sm tracking-widest uppercase shadow-[0_0_30px_rgba(0,229,204,0.3)] hover:shadow-[0_0_45px_rgba(0,229,204,0.5)] transition-all cubic-bezier(0.22,1,0.36,1) active:scale-95">
          Mark as Done
        </button>
</div>
</div>
<!-- Motivational Micro-copy -->
<div class="mt-12 flex items-center gap-2 text-outline-variant/60 font-label text-[10px] uppercase tracking-[0.2em]">
<span class="w-1.5 h-1.5 rounded-full bg-primary/40"></span>
      Deep Work Mode Active
    </div>
</main>
<!-- BottomNavBar Component -->
<nav class="fixed bottom-0 left-0 w-full h-20 z-50 flex justify-around items-center px-12 pb-4 bg-[#12121e]/80 backdrop-blur-2xl rounded-t-[2rem] border-t border-white/5 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<!-- Target / Timer (Active State Logic: Close match for 'Focus' screen) -->
<div class="flex flex-col items-center">
<div class="flex items-center justify-center bg-[#00e5cc]/10 text-[#00e5cc] rounded-full w-12 h-12 shadow-[0_0_20px_rgba(0,229,204,0.2)] cubic-bezier(0.22,1,0.36,1) transform active:scale-90">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
</div>
</div>
<!-- Check Circle / Tasks -->
<div class="flex flex-col items-center">
<div class="flex items-center justify-center text-[#474754] w-12 h-12 hover:bg-white/5 rounded-full transition-colors cubic-bezier(0.22,1,0.36,1) transform active:scale-90">
<span class="material-symbols-outlined" data-icon="Check_circle">check_circle</span>
</div>
</div>
<!-- Dashboard -->
<div class="flex flex-col items-center">
<div class="flex items-center justify-center text-[#474754] w-12 h-12 hover:bg-white/5 rounded-full transition-colors cubic-bezier(0.22,1,0.36,1) transform active:scale-90">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
</div>
</div>
</nav>
</body></html>
