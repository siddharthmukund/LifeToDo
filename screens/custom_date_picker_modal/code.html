<style>
    body { font-family: 'Manrope', sans-serif; }
    .glass-card {
      background: rgba(24, 24, 38, 0.7);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .neon-glow-primary {
      box-shadow: 0 0 20px rgba(0, 229, 204, 0.4);
    }
    .neon-glow-secondary {
      box-shadow: 0 0 15px rgba(197, 126, 255, 0.3);
    }
    .fluid-transition {
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .material-symbols-outlined {

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-[#0F0F1A]/80 backdrop-blur-xl z-40"></div>
<!-- Date Picker Modal Container -->
<div class="relative z-50 w-full max-w-2xl glass-card rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col">
<!-- Header -->
<header class="flex justify-between items-center px-8 py-8">
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container-highest fluid-transition hover:bg-surface-bright active:scale-95">
<span class="material-symbols-outlined text-on-surface text-xl">close</span>
</button>
<h1 class="text-2xl font-extrabold tracking-tight text-on-surface">Select Date Range</h1>
</div>
<button class="text-primary font-bold tracking-wide fluid-transition hover:text-primary-container uppercase text-sm">
        Reset
      </button>
</header>
<!-- Main Content Area: Bento Style Layout -->
<main class="px-8 pb-10 space-y-8">
<!-- Quick Selects Chips -->
<section>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full bg-secondary-container/20 border border-secondary/30 text-secondary text-sm font-bold fluid-transition hover:bg-secondary-container/40 hover:neon-glow-secondary active:scale-95">
            Next 7 Days
          </button>
<button class="px-5 py-2.5 rounded-full bg-secondary-container/20 border border-secondary/30 text-secondary text-sm font-bold fluid-transition hover:bg-secondary-container/40 hover:neon-glow-secondary active:scale-95">
            Next 30 Days
          </button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-highest border border-white/5 text-on-surface-variant text-sm font-bold fluid-transition hover:border-secondary/30 hover:text-secondary active:scale-95">
            Next 90 Days
          </button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-highest border border-white/5 text-on-surface-variant text-sm font-bold fluid-transition hover:border-secondary/30 hover:text-secondary active:scale-95">
            Custom
          </button>
</div>
</section>
<!-- Calendar View -->
<section class="grid grid-cols-1 md:grid-cols-1 gap-8">
<div class="bg-surface-container-low rounded-[2rem] p-6 border border-white/5">
<!-- Calendar Month Nav -->
<div class="flex justify-between items-center mb-8 px-2">
<h2 class="text-xl font-bold tracking-tight">September 2024</h2>
<div class="flex gap-2">
<button class="p-2 rounded-xl bg-surface-container-highest fluid-transition hover:bg-surface-bright">
<span class="material-symbols-outlined text-on-surface">chevron_left</span>
</button>
<button class="p-2 rounded-xl bg-surface-container-highest fluid-transition hover:bg-surface-bright">
<span class="material-symbols-outlined text-on-surface">chevron_right</span>
</button>
</div>
</div>
<!-- Weekdays -->
<div class="grid grid-cols-7 mb-4">
<div class="text-center text-[10px] font-extrabold uppercase tracking-widest text-outline">Sun</div>
<div class="text-center text-[10px] font-extrabold uppercase tracking-widest text-outline">Mon</div>
<div class="text-center text-[10px] font-extrabold uppercase tracking-widest text-outline">Tue</div>
<div class="text-center text-[10px] font-extrabold uppercase tracking-widest text-outline">Wed</div>
<div class="text-center text-[10px] font-extrabold uppercase tracking-widest text-outline">Thu</div>
<div class="text-center text-[10px] font-extrabold uppercase tracking-widest text-outline">Fri</div>
<div class="text-center text-[10px] font-extrabold uppercase tracking-widest text-outline">Sat</div>
</div>
<!-- Calendar Grid -->
<div class="grid grid-cols-7 gap-y-2">
<!-- Row 1 -->
<div class="h-12 flex items-center justify-center text-outline/30 font-medium">25</div>
<div class="h-12 flex items-center justify-center text-outline/30 font-medium">26</div>
<div class="h-12 flex items-center justify-center text-outline/30 font-medium">27</div>

<div class="h-12 flex items-center justify-center text-outline/30 font-medium">30</div>

<div class="h-12 flex items-center justify-center text-on-surface font-medium hover:bg-surface-container-highest rounded-xl cursor-pointer fluid-transition">5</div>

<div class="h-12 flex items-center justify-center text-on-surface font-medium hover:bg-surface-container-highest rounded-xl cursor-pointer fluid-transition">10</div>
<div class="h-12 flex items-center justify-center text-on-surface font-medium hover:bg-surface-container-highest rounded-xl cursor-pointer fluid-transition">11</div>

</div>

<div class="h-12 flex items-center justify-center bg-primary/20 text-primary font-bold">13</div>
<div class="h-12 flex items-center justify-center bg-primary/20 text-primary font-bold">14</div>
<div class="h-12 flex items-center justify-center bg-primary/20 text-primary font-bold">15</div>

<div class="h-12 flex items-center justify-center text-on-surface font-medium hover:bg-surface-container-highest rounded-xl cursor-pointer fluid-transition">20</div>

<div class="h-12 flex items-center justify-center text-on-surface font-medium hover:bg-surface-container-highest rounded-xl cursor-pointer fluid-transition">24</div>
<div class="h-12 flex items-center justify-center text-on-surface font-medium hover:bg-surface-container-highest rounded-xl cursor-pointer fluid-transition">25</div>
<div class="h-12 flex items-center justify-center text-on-surface font-medium hover:bg-surface-container-highest rounded-xl cursor-pointer fluid-transition">26</div>
<div class="h-12 flex items-center justify-center text-on-surface font-medium hover:bg-surface-container-highest rounded-xl cursor-pointer fluid-transition">27</div>
<div class="h-12 flex items-center justify-center text-on-surface font-medium hover:bg-surface-container-highest rounded-xl cursor-pointer fluid-transition">28</div>
<div class="h-12 flex items-center justify-center text-on-surface font-medium hover:bg-surface-container-highest rounded-xl cursor-pointer fluid-transition">29</div>
</div>
</div>
</section>
<!-- Selection Meta Display -->
<section class="flex flex-col md:flex-row gap-4 items-center justify-between p-6 bg-surface-container rounded-[1.5rem] border border-white/5">
<div class="flex flex-col">
<span class="text-[10px] font-extrabold uppercase tracking-widest text-outline">Start Date</span>
<span class="text-lg font-bold text-on-surface">Sept 12, 2024</span>
</div>
<div class="w-8 h-px bg-outline-variant hidden md:block"></div>
<div class="flex flex-col items-center md:items-end">
<span class="text-[10px] font-extrabold uppercase tracking-widest text-outline">End Date</span>
<span class="text-lg font-bold text-on-surface">Sept 19, 2024</span>
</div>
<div class="w-px h-10 bg-outline-variant hidden md:block"></div>
<div class="flex flex-col items-end">
<span class="text-[10px] font-extrabold uppercase tracking-widest text-primary">Duration</span>
<span class="text-lg font-extrabold text-primary">7 Days</span>
</div>
</section>
</main>
<!-- Footer Action -->
<footer class="p-8 bg-surface-container-low border-t border-white/5">
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container rounded-2xl flex items-center justify-center gap-3 text-on-primary font-extrabold text-lg neon-glow-primary active:scale-95 fluid-transition">
<span>Apply Range</span>
<span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</footer>
</div>
<!-- Decorative Background Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 blur-[120px] rounded-full pointer-events-none"></div>
</body></html>
