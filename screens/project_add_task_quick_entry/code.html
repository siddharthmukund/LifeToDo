<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Task Quick Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8a2ce2",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191121",
                        "surface": "#251a31",
                        "surface-light": "#362546",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .keyboard-gradient {
            background: linear-gradient(to bottom, #2d1f3d, #191121);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<!-- Project List Background (Blurred) -->
<div class="relative min-h-screen w-full p-6 opacity-40 blur-md pointer-events-none">
<header class="flex justify-between items-center mb-8">
<div>
<h1 class="text-2xl font-bold">Life To Do</h1>
<p class="text-slate-500">Project: Home Renovation</p>
</div>
<div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">person</span>
</div>
</header>
<div class="space-y-4">
<div class="p-4 bg-surface rounded-xl border border-primary/10 flex items-center gap-4">
<div class="w-6 h-6 rounded-full border-2 border-primary/40"></div>
<div class="h-4 w-32 bg-primary/20 rounded"></div>
</div>
<div class="p-4 bg-surface rounded-xl border border-primary/10 flex items-center gap-4">
<div class="w-6 h-6 rounded-full border-2 border-primary/40"></div>
<div class="h-4 w-48 bg-primary/20 rounded"></div>
</div>
<div class="p-4 bg-surface rounded-xl border border-primary/10 flex items-center gap-4">
<div class="w-6 h-6 rounded-full border-2 border-primary/40"></div>
<div class="h-4 w-24 bg-primary/20 rounded"></div>
</div>
</div>
</div>
<!-- Bottom Sheet Modal Overlay -->
<div class="fixed inset-0 z-50 flex flex-col justify-end bg-black/60">
<!-- Bottom Sheet Content -->
<div class="bg-surface rounded-t-xl border-t border-primary/20 flex flex-col items-stretch max-h-[85vh] overflow-hidden">
<!-- BottomSheetHandle -->
<button class="flex h-6 w-full items-center justify-center shrink-0">
<div class="h-1.5 w-12 rounded-full bg-primary/30"></div>
</button>
<div class="px-6 pt-2 pb-4">
<div class="flex justify-between items-center mb-4">
<h3 class="text-xl font-bold text-slate-100">Quick Add</h3>
<span class="text-xs font-semibold uppercase tracking-widest text-primary">Life To Do</span>
</div>
<!-- Input Area -->
<div class="mb-4">
<textarea autofocus="" class="form-input w-full resize-none border-0 bg-transparent p-0 text-xl font-medium text-slate-100 focus:ring-0 placeholder:text-slate-500" placeholder="What's the next action?" rows="3"></textarea>
</div>
<!-- Contexts & Attributes -->
<div class="flex flex-wrap gap-2 mb-6">
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-surface-light px-4 border border-primary/10">
<span class="material-symbols-outlined text-[18px] text-primary">call</span>
<p class="text-sm font-medium">@calls</p>
</div>
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary/20 px-4 border border-primary/30">
<span class="material-symbols-outlined text-[18px] text-primary">home</span>
<p class="text-sm font-medium">@home</p>
</div>
<div class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-surface-light px-4 border border-primary/10">
<span class="material-symbols-outlined text-[18px] text-slate-400">schedule</span>
<p class="text-sm font-medium">15m</p>
</div>
</div>
<!-- Energy Selector -->
<div class="flex items-center gap-4 mb-4">
<p class="text-xs font-bold text-slate-500 uppercase">Energy</p>
<div class="flex-1 flex h-10 items-center justify-center rounded-full bg-surface-light p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-2 has-[:checked]:bg-primary has-[:checked]:text-white text-slate-400 text-xs font-semibold">
<span>LOW</span>
<input class="invisible w-0" name="energy" type="radio" value="Low"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-2 has-[:checked]:bg-primary has-[:checked]:text-white text-slate-400 text-xs font-semibold">
<span>MED</span>
<input checked="" class="invisible w-0" name="energy" type="radio" value="Med"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-full px-2 has-[:checked]:bg-primary has-[:checked]:text-white text-slate-400 text-xs font-semibold">
<span>HIGH</span>
<input class="invisible w-0" name="energy" type="radio" value="High"/>
</label>
</div>
</div>
</div>
<!-- iOS Style Keyboard & Action Bar -->
<div class="keyboard-gradient pt-2 border-t border-primary/10">
<!-- Toolbar above keyboard -->
<div class="flex justify-between items-center px-4 py-3">
<div class="flex gap-4">
<button class="text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">calendar_today</span>
</button>
<button class="text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">flag</span>
</button>
<button class="text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">attach_file</span>
</button>
</div>
<button class="bg-primary hover:bg-primary/90 text-white font-bold py-2 px-6 rounded-full shadow-lg shadow-primary/20 flex items-center gap-2">
                        Add Task
                        <span class="material-symbols-outlined text-sm">send</span>
</button>
</div>
<!-- Mock iOS Keyboard -->
<div class="px-1.5 pb-8 pt-2">
<div class="flex gap-1.5 mb-2 justify-center">
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">Q</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">W</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">E</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">R</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">T</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">Y</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">U</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">I</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">O</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">P</div>
</div>
<div class="flex gap-1.5 mb-2 justify-center px-4">
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">A</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">S</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">D</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">F</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">G</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">H</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">J</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">K</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">L</div>
</div>
<div class="flex gap-1.5 mb-2 justify-center">
<div class="h-10 w-12 bg-slate-500/40 rounded flex items-center justify-center text-slate-200">
<span class="material-symbols-outlined text-[18px]">shift</span>
</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">Z</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">X</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">C</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">V</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">B</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">N</div>
<div class="h-10 w-8 bg-slate-700/50 rounded flex items-center justify-center text-slate-200">M</div>
<div class="h-10 w-12 bg-slate-500/40 rounded flex items-center justify-center text-slate-200">
<span class="material-symbols-outlined text-[18px]">backspace</span>
</div>
</div>
<div class="flex gap-1.5 justify-center px-1">
<div class="h-10 w-12 bg-slate-500/40 rounded flex items-center justify-center text-slate-200 text-sm">123</div>
<div class="h-10 flex-1 bg-slate-700/50 rounded flex items-center justify-center text-slate-200 text-sm">space</div>
<div class="h-10 w-20 bg-primary/40 rounded flex items-center justify-center text-white text-sm font-bold">return</div>
</div>
<!-- iOS Home Indicator -->
<div class="flex justify-center mt-6">
<div class="w-32 h-1 bg-white/20 rounded-full"></div>
</div>
</div>
</div>
</div>
</div>
</body></html>
