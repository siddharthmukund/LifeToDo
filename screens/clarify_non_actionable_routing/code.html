<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Clarify: Non-Actionable Routing</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2bee6c",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header / Progress Area -->
<header class="pt-12 px-6 pb-4">
<div class="flex items-center justify-between mb-6">
<button class="w-10 h-10 flex items-center justify-start text-slate-400">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Clarify</h1>
<div class="w-10"></div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-end">
<span class="text-xs font-semibold uppercase tracking-widest text-primary/80">Step 3 of 3</span>
<span class="text-xs font-medium text-slate-400">Non-actionable routing</span>
</div>
<div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary w-full rounded-full"></div>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 px-6 flex flex-col gap-8">
<!-- Inbox Item Card (Reference) -->
<section>
<div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-4 flex gap-4 items-center">
<div class="w-16 h-16 rounded-lg bg-cover bg-center shrink-0" data-alt="Close up of a financial spreadsheet on a desk" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDkiVcwqy4M4nIU0mAcDArrXZ_GepipnqHZb7HZJCRKsjNVmA5p9I2-l04gZYfip4SOJ8d9WlyN4iiQmhfXBHRWn2ywTox7Y8HD5HJqB9YY7DLT_f3p2Ze3XLSWgLyn54QS3hyLFbwV-varUsQxhyiOCWTFgMqZKl3bg4RD_br74P25s00j8TU7pTAHohu3zieuP1wy_Fcnsci5bRKTa_FpRJbL9WDpktl9FYS_F6aOsxLQJ4N93dfRmRpK78Pb3U9O48MqV4EnPxc')">
</div>
<div class="flex-1 overflow-hidden">
<p class="text-sm font-medium text-slate-400 mb-0.5">Current Item</p>
<h2 class="text-lg font-bold truncate">Review quarterly budget</h2>
</div>
</div>
</section>
<!-- Sorting Grid -->
<section class="flex-1 flex flex-col justify-center">
<p class="text-center text-slate-400 text-sm mb-8">Where should this go?</p>
<div class="grid grid-cols-2 gap-4">
<!-- Project -->
<button class="aspect-square bg-slate-900 border border-slate-800 rounded-xl flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">account_tree</span>
</div>
<span class="font-bold text-base">Project</span>
</button>
<!-- Waiting -->
<button class="aspect-square bg-slate-900 border border-slate-800 rounded-xl flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400">
<span class="material-symbols-outlined text-3xl">hourglass_empty</span>
</div>
<span class="font-bold text-base">Waiting</span>
</button>
<!-- Someday/Maybe -->
<button class="aspect-square bg-slate-900 border border-slate-800 rounded-xl flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-purple-500/10 flex items-center justify-center text-purple-400">
<span class="material-symbols-outlined text-3xl">lightbulb</span>
</div>
<span class="font-bold text-base">Someday</span>
</button>
<!-- Trash (Red Tinted) -->
<button class="aspect-square bg-red-950/20 border border-red-900/30 rounded-xl flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform group">
<div class="w-12 h-12 rounded-full bg-red-500/10 flex items-center justify-center text-red-500 group-active:bg-red-500/20">
<span class="material-symbols-outlined text-3xl">delete</span>
</div>
<span class="font-bold text-base text-red-400">Trash</span>
</button>
</div>
</section>
<!-- Skip / Help Action -->
<div class="py-6 text-center">
<button class="text-slate-500 font-medium text-sm flex items-center justify-center gap-2 mx-auto">
<span class="material-symbols-outlined text-lg">info</span>
                Sorting Guide
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="border-t border-slate-800 bg-background-dark/80 backdrop-blur-lg pb-8 pt-3 px-4 flex justify-around items-center">
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">inbox</span>
<span class="text-[10px] font-medium">Inbox</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined filled-icon">account_tree</span>
<span class="text-[10px] font-medium">Clarify</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">checklist</span>
<span class="text-[10px] font-medium">Projects</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="text-[10px] font-medium">Calendar</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-medium">Settings</span>
</a>
</nav>
</body></html>
